name    = DBIO
author  = DBIx::Class & DBIO Contributors (see AUTHORS file)
license = Perl_5
copyright_holder = DBIO Contributors
copyright_year   = 2005

[VersionFromMainModule]

[Git::GatherDir]
exclude_filename = META.yml
exclude_filename = META.json
exclude_filename = MANIFEST
exclude_filename = README
exclude_filename = README.md
exclude_filename = Dockerfile
exclude_filename = .mailmap
exclude_filename = .dir-locals.el
exclude_filename = .gitattributes
exclude_filename = Features_09
exclude_filename = TODO
exclude_filename = CLAUDE.md
exclude_filename = LICENSE
exclude_match = ^maint/
exclude_match = ^inc/
exclude_match = ^cover_db/
exclude_match = ^\.claude/
exclude_match = ^t/var/
exclude_match = docker-compose

[PruneCruft]

[MetaJSON]
[MetaYAML]

[MetaNoIndex]
directory = lib/DBIO/Admin
package = DBIO::Storage::DBIHacks
package = DBIO::Storage::BlockRunner
package = DBIO::Carp
package = DBIO::_Util
package = DBIO::_ENV_

[MetaResources]
repository.type = git
repository.url  = https://github.com/Perl5/DBIO.git
repository.web  = https://github.com/Perl5/DBIO
bugtracker.web  = https://github.com/Perl5/DBIO/issues

[MetaProvides::Package]

[Prereqs::FromCPANfile]

[ExecDir]
dir = script

[PodWeaver]

[ExtraTests]

[MakeMaker::Awesome]
eumm_version = 6.78

[License]

[Readme]

[ManifestSkip]
[Manifest]

[MetaConfig]

[Git::Check]
allow_dirty = dist.ini
allow_dirty = Changes
allow_dirty = cpanfile

[Git::CheckFor::CorrectBranch]
release_branch = main


[Git::Commit]
[Git::Tag]
tag_format = v%V

[Git::Push]
