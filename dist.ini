license       = Perl_5
copyright_year = 2005

[@DBIO]
core = 1
heritage = 1

[MetaNoIndex]
; All internal test helpers - these are only used by dbio's own test
; suite and should not show up on CPAN search. Real public test
; facilities (DBIO::Test, DBIO::Test::Storage, DBIO::Test::Util,
; DBIO::Test::Cursor, DBIO::Test::BaseResult, DBIO::Test::BaseResultSet,
; DBIO::Test::Future, DBIO::Test::DateTimeParser, DBIO::Test::Kubernetes)
; are intentionally left indexed.
namespace = DBIO::Test::Namespace
namespace = DBIO::Test::Schema
namespace = DBIO::Test::DeployComponent
namespace = DBIO::Test::ErrorComponent
namespace = DBIO::Test::FakeComponent
namespace = DBIO::Test::ForeignComponent
namespace = DBIO::Test::OptionalComponent
namespace = DBIO::Test::ResultSetManager
namespace = DBIO::Test::SyntaxErrorComponent1
namespace = DBIO::Test::SyntaxErrorComponent2
namespace = DBIO::Test::SyntaxErrorComponent3
namespace = DBIO::Test::Taint
namespace = DBIO::Test::DynamicForeignCols
package   = DBIO::Test::Storage::FakeSth
package   = DBIO::Test::Storage::FakeCursor

[MetaResources]
repository.type = git
repository.url  = https://github.com/p5-dbio/dbio.git
repository.web  = https://github.com/p5-dbio/dbio
bugtracker.web  = https://github.com/p5-dbio/dbio/issues
