# Reference manifest for manual debugging.
# The actual pods are created programmatically via IO::K8s objects.
#
# Usage:
#   kubectl apply -f maint/k8s/pg-pod.yaml -n dbic-test-xxx
#   kubectl port-forward -n dbic-test-xxx svc/pg-svc 5432:5432
#   DBICTEST_PG_DSN='dbi:Pg:database=dbic_test;host=127.0.0.1;port=5432' \
#     DBICTEST_PG_USER=postgres DBICTEST_PG_PASS=dbictest \
#     prove -l t/72pg.t
---
apiVersion: v1
kind: Pod
metadata:
  name: pg
  labels:
    app: pg
    role: dbic-test-db
spec:
  containers:
    - name: pg
      image: postgres:16
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_PASSWORD
          value: dbictest
        - name: POSTGRES_DB
          value: dbic_test
      readinessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - postgres
        initialDelaySeconds: 5
        periodSeconds: 3
        timeoutSeconds: 2
        failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: pg-svc
spec:
  selector:
    app: pg
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
